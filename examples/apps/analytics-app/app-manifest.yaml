apiVersion: "v1"
kind: "App"

metadata:
  name: analytics-dashboard
  version: 1.0.0
  description: Real-time analytics dashboard with metrics collection and visualization
  author: SuperInstance
  license: Apache-2.0
  tags: [monitoring, analytics, dashboard, metrics]
  keywords: [analytics, dashboard, metrics, monitoring, visualization]

category: monitoring

components:
  - name: metrics-collector
    version: ">=1.0.0"
    required: true
    configuration:
      scrape_interval: 15
      retention_days: 30
      max_series: 100000

  - name: query-router
    version: "^1.0.0"
    required: true
    configuration:
      max_concurrent: 100
      timeout_seconds: 30
      cache_size: "1GB"

  - name: semantic-cache
    version: "^1.0.0"
    required: true
    configuration:
      cache_size: "1GB"
      ttl_seconds: 300
      similarity_threshold: 0.95

  - name: visualization-engine
    version: ">=1.0.0"
    required: true
    configuration:
      default_charts: [line, bar, pie, gauge]
      max_datapoints: 10000
      enable_interactive: true

  - name: alerting-engine
    version: ">=1.0.0"
    required: true
    configuration:
      enabled: true
      evaluation_interval: 30
      notification_channels: [webhook, email]

advanced_components:
  - name: anomaly-detection
    version: ">=1.0.0"
    description: ML-based anomaly detection for metrics and logs
    configuration:
      sensitivity: 0.8
      alert_threshold: 0.9
      window_size: 100
      model_type: isolation_forest

  - name: report-generator
    version: ">=1.0.0"
    description: Automated report generation and scheduling
    configuration:
      formats: [pdf, csv, json]
      schedule: "0 8 * * 1"  # Weekly on Monday
      include_charts: true
      include_raw_data: false

  - name: forecasting-engine
    version: ">=1.0.0"
    description: Time series forecasting for capacity planning
    configuration:
      model: prophet
      forecast_horizon: 7  # days
      confidence_interval: 0.95

  - name: distributed-tracing
    version: ">=1.0.0"
    description: End-to-end distributed tracing with span analysis
    configuration:
      sample_rate: 0.1
      max_span_size: 1000
      retention_days: 7

configuration:
  environment: production
  log_level: info
  enable_metrics: true
  enable_tracing: true

environment_vars:
  DATABASE_URL: "${DATABASE_URL}"
  ALERT_WEBHOOK_URL: "${ALERT_WEBHOOK_URL}"
  SMTP_HOST: "${SMTP_HOST}"
  LOG_LEVEL: "info"

networking:
  host: "0.0.0.0"
  port: 9090
  expose:
    - "9090/tcp"
    - "9091/tcp"  # Metrics endpoint

storage:
  data_path: "/var/lib/aequor/analytics-dashboard/data"
  cache_path: "/var/lib/aequor/analytics-dashboard/cache"
  persistence_enabled: true
  backup_enabled: true
  backup_schedule: "0 1 * * *"
  backup_retention_days: 90

scaling:
  mode: horizontal
  instances: 2
  min_instances: 2
  max_instances: 10
  cpu_limit: "4"
  memory_limit: "8Gi"
  auto_scaling:
    enabled: true
    target_cpu_percent: 70
    target_memory_percent: 80

health_checks:
  enabled: true
  interval_seconds: 30
  timeout_seconds: 5
  failure_threshold: 3
  endpoints:
    - path: "/health"
      method: "GET"
      expected_status: 200
    - path: "/metrics"
      method: "GET"
      expected_status: 200

telemetry:
  enabled: true
  sampled: 0.1
