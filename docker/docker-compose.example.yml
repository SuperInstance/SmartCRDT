# Example Docker Compose Configuration for Aequor Cognitive Orchestration Platform
# This file demonstrates best practices for running Aequor in a containerized environment
# Copy this to docker-compose.yml and customize as needed

version: '3.9'

services:
  # ============================================================================
  # Aequor Main Service - Production Configuration
  # ============================================================================
  aequor:
    image: aequor-ecosystem:latest
    container_name: aequor-main
    restart: unless-stopped
    ports:
      - "3000:3000"  # Main API endpoint
      - "9229:9229"  # Node.js debugging (remove in production)
    environment:
      # Application Configuration
      - NODE_ENV=production
      - LSI_LOG_LEVEL=info
      - LSI_VERSION=4.0
      - LSI_DATA_PATH=/app/data
      - LSI_CACHE_PATH=/app/cache

      # API Keys - IMPORTANT: Use environment secrets in production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Database Configuration
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aequor_db

      # Redis Configuration
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      # Vector Database Configuration
      - VECTOR_DB_TYPE=chroma
      - CHROMA_HOST=chroma
      - CHROMA_PORT=8000
      - CHROMA_TOKEN=${CHROMA_TOKEN}

      # Performance Configuration
      - MAX_MEMORY_MB=1024
      - MAX_CACHE_SIZE=512
      - ENABLE_METRICS=true
      - METRICS_PORT=9090
    volumes:
      # Persistent data storage
      - aequor_data:/app/data:rw
      - aequor_cache:/app/cache:rw
      - aequor_logs:/app/logs:rw

      # Configuration files (optional)
      - ./config:/app/config:ro  # Mount custom config if needed

      # Certificates (for SSL/TLS)
      - ./certs:/app/certs:ro  # Mount SSL certificates

      # Knowledge cartridges
      - ./cartridges:/app/cartridges:rw

      # Read-only package source (for development)
      # - ./packages:/app/packages:ro  # Uncomment for development
    networks:
      - aequor-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
    deploy:
      # Resource limits
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

      # Placement constraints (optional)
      placement:
        constraints:
          - node.role == manager
          - node.labels.aequor-node == true

      # Update config
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: continue
        monitor: 30s

      # Restart policy
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: true
    labels:
      - "com.aequor.service=main"
      - "com.aequor.version=4.0"
      - "traefik.enable=true"  # For Traefik integration
      - "traefik.http.routers.aequor.rule=Host(`aequor.local`)"
      - "traefik.http.routers.aequor.entrypoints=websecure"

  # ============================================================================
  # PostgreSQL Database - Production Configuration
  # ============================================================================
  postgres:
    image: postgres:15-alpine
    container_name: aequor-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=aequor_db
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro  # Optional init script
      - ./postgres/backups:/backups  # For backup scripts
    networks:
      - aequor-network
    ports:
      - "5432:5432"  # Expose for external tools (remove in production)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.aequor.service=database"
      - "com.aequor.type=postgres"

  # ============================================================================
  # Redis Cache - Production Configuration
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: aequor-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
      --maxmemory-samples 10
      --timeout 0
      --tcp-keepalive 300
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro  # Optional custom config
    networks:
      - aequor-network
    ports:
      - "6379:6379"  # Expose for external tools (remove in production)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.aequor.service=cache"
      - "com.aequor.type=redis"

  # ============================================================================
  # Chroma Vector Database - Production Configuration
  # ============================================================================
  chroma:
    image: chromadb/chroma:latest
    container_name: aequor-chroma
    restart: unless-stopped
    environment:
      - ANONYMIZED_TELEMETRY=False
      - ALLOW_RESET=TRUE
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_TOKEN}
      - CHROMA_SERVER_AUTH_CREDENTIALS_FILE=/chroma/auth.toml
      - PERSIST_DIRECTORY=/chroma/chroma
      - CHROMA_LOG_LEVEL=INFO
    volumes:
      - chroma_data:/chroma/chroma
      - ./chroma/auth.toml:/chroma/auth.toml:ro  # Authentication config
    networks:
      - aequor-network
    ports:
      - "8000:8000"  # Expose for external tools (remove in production)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.aequor.service=vectordb"
      - "com.aequor.type=chroma"

  # ============================================================================
  # Ollama (Local LLM Service) - Optional
  # ============================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: aequor-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/models:/mnt/models  # Optional: mount custom models
    networks:
      - aequor-network
    ports:
      - "11434:11434"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
      # GPU support (uncomment if available)
      # placement:
      #   constraints:
      #     - node.labels.gpu == true
      # runtime: nvidia
    labels:
      - "com.aequor.service=ollama"
      - "com.aequor.type=llm"

  # ============================================================================
  # Prometheus Metrics - Optional
  # ============================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: aequor-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - aequor-network
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      - "com.aequor.service=monitoring"
      - "com.aequor.type=prometheus"

  # ============================================================================
  # Grafana Dashboard - Optional
  # ============================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: aequor-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - aequor-network
    ports:
      - "3001:3000"  # Grafana web interface
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    labels:
      - "com.aequor.service=monitoring"
      - "com.aequor.type=grafana"

  # ============================================================================
  # Nginx Reverse Proxy - Optional (Production Recommended)
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: aequor-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - aequor-network
      - proxy  # External network for load balancers
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - aequor
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    labels:
      - "com.aequor.service=proxy"
      - "com.aequor.type=nginx"
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.rule=Host(`aequor.local`)"

# ============================================================================
# Networks Configuration
# ============================================================================
networks:
  # Internal network for service communication
  aequor-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
    name: aequor-network

  # External network for reverse proxy/load balancer
  proxy:
    external: true
    name: proxy-network

# ============================================================================
# Volumes Configuration
# ============================================================================
volumes:
  # Application data
  aequor_data:
    driver: local
  aequor_cache:
    driver: local
  aequor_logs:
    driver: local

  # Database volumes
  postgres_data:
    driver: local
  redis_data:
    driver: local
  chroma_data:
    driver: local

  # Optional services
  ollama_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local